# Istio Base (CRDs and Cluster Resources) Configuration
# Chart: istio/base v1.28.1
# Official install: helm install istio-base istio/base -n istio-system --set defaultRevision=default
# Reference: https://istio.io/latest/docs/setup/install/helm/

# Global settings
global:
  istioNamespace: istio-system
  # resourceScope: all = cluster + namespace scoped resources (upstream default)
  resourceScope: all

# Base chart configuration
base:
  enableCRDTemplates: true
  enableIstioConfigCRDs: true
  excludedCRDs: []

# Default revision (maps to: --set defaultRevision=default)
defaultRevision: "default"

# Experimental features (upstream default: false)
experimental:
  stableValidationPolicy: false
