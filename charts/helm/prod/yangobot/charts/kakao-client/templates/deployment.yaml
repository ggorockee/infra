{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kakao-client
  labels:
    app.kubernetes.io/name: kakao-client
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  # Loco 프로토콜은 동일 계정 단일 세션만 허용 — 절대 1 이상으로 변경 금지
  replicas: 1
  revisionHistoryLimit: 2
  # RollingUpdate 사용 시 구/신 pod 동시 기동으로 세션 충돌 발생
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kakao-client
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kakao-client
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: kakao-client
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ .Values.credentialSecret.name }}
          env:
            - name: YANGOBOT_API_URL
              value: {{ .Values.yanbotApiUrl | quote }}
            - name: CREDENTIAL_PATH
              value: "/data/credential.json"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kakao-client-data
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
{{- end }}
