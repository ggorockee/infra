enabled: true

image:
  repository: ggorockee/yangobot-kakao-client
  pullPolicy: IfNotPresent
  tag: "latest"

# yangobot 서비스 내부 URL (ClusterIP 서비스명)
yanbotApiUrl: "http://yangobot"

# GCP Secret Manager에서 생성되는 k8s Secret 이름
credentialSecret:
  name: kakao-client-credentials

# 크리덴셜 파일 저장용 PVC
persistence:
  size: 10Mi
  storageClass: ""

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"
