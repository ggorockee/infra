# Kube-Prometheus-Stack Custom Values Override
# 1인 개발자용 모니터링 스택 설정

# External Secret 설정
externalSecret:
  enabled: true
  name: "grafana-oauth-secret"
  namespace: "monitoring"
  refreshInterval: "5m"
  clusterSecretStoreName: "gcpsm-secret-store"
  gcpSecretName: "prod-argocd-dex-credentials"
  # GCP Secret Manager에서 가져올 속성들
  properties:
    clientId: "google.clientId"
    clientSecret: "google.clientSecret"

# ClusterSecretStore 설정
# NOTE: ClusterSecretStore는 Terraform에서 관리됩니다 (gcp/terraform/modules/external-secrets/cluster-secret-store.tf)
# Helm 차트에서는 생성하지 않고, 기존 ClusterSecretStore를 참조만 합니다.
clusterSecretStore:
  enabled: false  # Terraform에서 관리하므로 비활성화
  name: "gcpsm-secret-store"
  gcpProjectID: "yango-501407"
  clusterLocation: "asia-northeast3-a"
  clusterName: "woohalabs-prod-gke"
  serviceAccount:
    name: "external-secrets"
    namespace: "external-secrets-system"
    gcpServiceAccount: "external-secrets-prod@yango-501407.iam.gserviceaccount.com"

# Grafana 설정
grafana:
  enabled: true

  # Deployment 전략: Recreate (RWO PVC 사용 시 필수)
  # Rolling Update는 새 Pod를 먼저 시작하려 하지만, RWO PVC는 동시 마운트 불가능
  # Recreate는 이전 Pod를 먼저 종료하고 새 Pod를 시작하여 PVC 충돌 방지
  # deploymentStrategy 객체 전체를 재정의하여 rollingUpdate 제거
  deploymentStrategy:
    type: Recreate

  # Grafana External Secret 설정 (GCP Secret Manager 연동)
  externalSecret:
    enabled: true
    name: "grafana-oauth-secret"
    namespace: "monitoring"
    refreshInterval: "60m"
    clusterSecretStoreName: "gcpsm-secret-store"
    gcpSecretName: "prod-monitoring-smtp-credentials"
    # GCP Secret Manager에서 가져올 속성들 (key: property 매핑)
    # 왼쪽: Kubernetes Secret 키 (파일 이름으로 마운트됨)
    # 오른쪽: GCP Secret Manager JSON 속성 경로
    properties:
      client_id: "google.clientId"
      client_secret: "google.clientSecret"
      admin_emails: "admin.emails"
      admin_password: "password"
      EMAIL_HOST: "EMAIL_HOST"
      EMAIL_PORT: "EMAIL_PORT"
      EMAIL_USE_TLS: "EMAIL_USE_TLS"
      EMAIL_HOST_USER: "EMAIL_HOST_USER"
      EMAIL_HOST_PASSWORD: "EMAIL_HOST_PASSWORD"
      DEFAULT_FROM_EMAIL: "DEFAULT_FROM_EMAIL"

  # ArgoCD Sync Wave 설정 (External Secret이 먼저 생성되도록)
  deploymentAnnotations:
    argocd.argoproj.io/sync-wave: "0"

  # Admin 초기 비밀번호 (External Secret으로 관리 예정)
  adminPassword: "changeme-will-be-overridden-by-external-secret"

  # Persistence 설정 (GCP Persistent Disk - 비용 최적화)
  persistence:
    enabled: true
    type: pvc
    storageClassName: "gcp-standard-rwo-retain"  # GCP Retain 정책으로 데이터 보존
    accessModes:
      - ReadWriteOnce
    size: 5Gi  # Grafana 데이터 축소 (대시보드/설정만 저장)
    finalizers:
      - kubernetes.io/pvc-protection

  # Grafana Ingress 비활성화 (Istio VirtualService 사용)
  ingress:
    enabled: false

  # Service 설정 (Istio를 통한 외부 노출)
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
    portName: http-web

  # Grafana 도메인 설정
  grafana.ini:
    server:
      domain: grafana.ggorockee.com
      root_url: "https://grafana.ggorockee.com"
      serve_from_sub_path: false

    # Google OAuth (Dex) 설정
    auth.generic_oauth:
      enabled: true
      name: Google
      allow_sign_up: true
      client_id: $__file{/etc/secrets/auth/client_id}
      client_secret: $__file{/etc/secrets/auth/client_secret}
      scopes: openid email profile
      auth_url: https://accounts.google.com/o/oauth2/v2/auth
      token_url: https://oauth2.googleapis.com/token
      api_url: https://openidconnect.googleapis.com/v1/userinfo
      allowed_domains: gmail.com
      allow_assign_grafana_admin: true
      role_attribute_path: "(email == 'woohaen88@gmail.com' || email == 'woohalabs@gmail.com' || email == 'ggorockee@gmail.com') && 'Admin' || 'Viewer'"

    # 익명 접근 비활성화
    auth.anonymous:
      enabled: false

    # 기본 로그인 비활성화 (OAuth만 사용)
    auth.basic:
      enabled: false

  # External Secret 마운트
  extraSecretMounts:
    - name: auth-generic-oauth-secret
      secretName: grafana-oauth-secret
      defaultMode: 0440
      mountPath: /etc/secrets/auth
      readOnly: true

  # Sidecar 설정 (대시보드 자동 로드)
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
      defaultDatasourceEnabled: true

  # Additional DataSources (Loki)
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.logging.svc.cluster.local:80
      jsonData:
        maxLines: 1000
      editable: false

# Prometheus 설정
prometheus:
  enabled: true

  # Prometheus Ingress 비활성화 (Istio VirtualService 사용)
  ingress:
    enabled: false

  # Service 설정
  service:
    type: ClusterIP
    port: 9090
    targetPort: 9090
    portName: http-web

  # Prometheus Spec
  prometheusSpec:
    # Retention 설정 (1인 개발자용 - 비용 최적화)
    retention: 15d
    retentionSize: "18GB"  # 실제 데이터 제한 (20GB 중 여유 공간 2GB)

    # 리소스 제한 (1인 개발자용)
    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: 2000m
        memory: 4Gi

    # Persistence 설정 (GCP Persistent Disk - 비용 최적화)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gcp-standard-rwo-retain  # GCP Retain 정책으로 데이터 보존
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi  # PVC 최대 크기 20GB

    # External URL 설정
    externalUrl: "https://prom.ggorockee.com"

    # Pod Monitor/Service Monitor 자동 발견
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

    # Scrape 간격
    scrapeInterval: 30s
    evaluationInterval: 30s

# Alertmanager 설정
alertmanager:
  enabled: true

  # ArgoCD 리소스 추적 제외 (Prometheus Operator가 생성하는 StatefulSet/Pod 보호)
  # ArgoCD ServerSideApply와 Operator 충돌 방지
  annotations:
    argocd.argoproj.io/sync-options: "Prune=false"

  # Ingress 비활성화
  ingress:
    enabled: false

  # Alertmanager Spec
  alertmanagerSpec:
    # Persistence 설정 (비용 최적화)
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gcp-standard-rwo-retain  # GCP Retain 정책으로 데이터 보존
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi  # Alert 히스토리만 저장

    # 리소스 제한
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # External Secret 마운트 (SMTP credentials)
    secrets:
      - grafana-oauth-secret  # SMTP credentials가 포함된 secret

    # SMTP 환경 변수 주입 (Secret에서 로드)
    containers:
      - name: alertmanager
        env:
          - name: SMTP_HOST
            valueFrom:
              secretKeyRef:
                name: grafana-oauth-secret
                key: EMAIL_HOST
          - name: SMTP_PORT
            valueFrom:
              secretKeyRef:
                name: grafana-oauth-secret
                key: EMAIL_PORT
          - name: SMTP_USER
            valueFrom:
              secretKeyRef:
                name: grafana-oauth-secret
                key: EMAIL_HOST_USER
          - name: SMTP_PASSWORD
            valueFrom:
              secretKeyRef:
                name: grafana-oauth-secret
                key: EMAIL_HOST_PASSWORD
          - name: EMAIL_FROM
            valueFrom:
              secretKeyRef:
                name: grafana-oauth-secret
                key: DEFAULT_FROM_EMAIL
          - name: ADMIN_EMAILS
            valueFrom:
              secretKeyRef:
                name: grafana-oauth-secret
                key: admin_emails

  # Alertmanager Config
  config:
    global:
      resolve_timeout: 5m
      smtp_from: $EMAIL_FROM
      smtp_smarthost: $SMTP_HOST:$SMTP_PORT
      smtp_auth_username: $SMTP_USER
      smtp_auth_password: $SMTP_PASSWORD
      smtp_require_tls: true

    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'email-notifications'
      routes:
        - match:
            severity: critical
          receiver: 'email-critical'
          repeat_interval: 4h
        - match:
            severity: warning
          receiver: 'email-notifications'
          repeat_interval: 12h

    receivers:
      - name: 'email-notifications'
        email_configs:
          - to: $ADMIN_EMAILS
            headers:
              Subject: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }} - {{ .CommonLabels.service }}'
            html: |
              <!DOCTYPE html>
              <html>
              <head><meta charset="UTF-8"></head>
              <body>
              <h2>Alert: {{ .GroupLabels.alertname }}</h2>
              <p><strong>Status:</strong> {{ .Status }}</p>
              <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
              <p><strong>Service:</strong> {{ .CommonLabels.service }}</p>
              <h3>Details:</h3>
              <ul>
              {{ range .Alerts }}
                <li>
                  <strong>{{ .Labels.alertname }}</strong><br/>
                  {{ .Annotations.description }}<br/>
                  <em>Started: {{ .StartsAt }}</em>
                </li>
              {{ end }}
              </ul>
              </body>
              </html>

      - name: 'email-critical'
        email_configs:
          - to: $ADMIN_EMAILS
            headers:
              Subject: '🚨 [CRITICAL] {{ .GroupLabels.alertname }} - {{ .CommonLabels.service }}'
            html: |
              <!DOCTYPE html>
              <html>
              <head><meta charset="UTF-8"></head>
              <body style="background-color: #ffebee; padding: 20px;">
              <h2 style="color: #c62828;">🚨 Critical Alert: {{ .GroupLabels.alertname }}</h2>
              <p><strong>Status:</strong> {{ .Status }}</p>
              <p><strong>Severity:</strong> <span style="color: #c62828;">CRITICAL</span></p>
              <p><strong>Service:</strong> {{ .CommonLabels.service }}</p>
              <h3>Immediate Action Required:</h3>
              <ul>
              {{ range .Alerts }}
                <li style="margin-bottom: 10px;">
                  <strong>{{ .Labels.alertname }}</strong><br/>
                  {{ .Annotations.description }}<br/>
                  <em>Started: {{ .StartsAt }}</em>
                </li>
              {{ end }}
              </ul>
              </body>
              </html>

# Prometheus Operator 설정
prometheusOperator:
  enabled: true

  # 리소스 제한
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Node Exporter 설정
prometheus-node-exporter:
  enabled: true

# Kube State Metrics 설정
kube-state-metrics:
  enabled: true

# Default Rules 활성화
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: true
    kubeSchedulerRecording: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# CoreDNS 설정 (GKE 환경)
coreDns:
  enabled: true
  service:
    enabled: true
    port: 9153  # ServiceMonitor에서 사용할 포트
    targetPort: 10054  # GKE CoreDNS 실제 메트릭 포트 (표준 9153이 아닌 10054 사용)

# 공통 라벨
commonLabels:
  managed-by: argocd
  environment: production

# Additional Prometheus Rules (Custom Alert Rules)
additionalPrometheusRulesMap:
  custom-application-alerts:
    groups:
      - name: http-performance-alerts
        interval: 30s
        rules:
          # ReviewMaps HTTP Error Rate
          - alert: ReviewMapsHighErrorRate
            expr: |
              (sum(rate(reviewmaps_http_requests_total{status=~"5.."}[5m])) / sum(rate(reviewmaps_http_requests_total[5m]))) * 100 > 5
            for: 5m
            labels:
              severity: critical
              service: reviewmaps
              category: http
            annotations:
              summary: "ReviewMaps HTTP 에러율이 높습니다"
              description: "ReviewMaps의 HTTP 5xx 에러율이 {{ $value | humanizePercentage }}로 5분 이상 5%를 초과했습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/high-error-rate"

          # Ojeomneo HTTP Error Rate
          - alert: OjeomneoPlatformHighErrorRate
            expr: |
              (sum(rate(ojeomneo_http_requests_total{status=~"5.."}[5m])) / sum(rate(ojeomneo_http_requests_total[5m]))) * 100 > 5
            for: 5m
            labels:
              severity: critical
              service: ojeomneo
              category: http
            annotations:
              summary: "Ojeomneo HTTP 에러율이 높습니다"
              description: "Ojeomneo의 HTTP 5xx 에러율이 {{ $value | humanizePercentage }}로 5분 이상 5%를 초과했습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/high-error-rate"

          # ReviewMaps High Latency
          - alert: ReviewMapsHighLatency
            expr: |
              histogram_quantile(0.95, sum by (le) (rate(reviewmaps_http_request_duration_seconds_bucket[5m]))) > 1
            for: 5m
            labels:
              severity: warning
              service: reviewmaps
              category: http
            annotations:
              summary: "ReviewMaps HTTP 레이턴시가 높습니다"
              description: "ReviewMaps의 P95 레이턴시가 {{ $value | humanizeDuration }}로 5분 이상 1초를 초과했습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/high-latency"

          # Ojeomneo High Latency
          - alert: OjeomneoPlatformHighLatency
            expr: |
              histogram_quantile(0.95, sum by (le) (rate(ojeomneo_http_request_duration_seconds_bucket[5m]))) > 1
            for: 5m
            labels:
              severity: warning
              service: ojeomneo
              category: http
            annotations:
              summary: "Ojeomneo HTTP 레이턴시가 높습니다"
              description: "Ojeomneo의 P95 레이턴시가 {{ $value | humanizeDuration }}로 5분 이상 1초를 초과했습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/high-latency"

      - name: database-performance-alerts
        interval: 30s
        rules:
          # ReviewMaps Slow Queries
          - alert: ReviewMapsDatabaseSlowQueries
            expr: |
              sum(rate(reviewmaps_db_slow_queries_total[5m])) > 1
            for: 5m
            labels:
              severity: warning
              service: reviewmaps
              category: database
            annotations:
              summary: "ReviewMaps 데이터베이스 슬로우 쿼리가 많습니다"
              description: "ReviewMaps에서 초당 {{ $value | humanize }}개의 슬로우 쿼리(>1초)가 5분 이상 발생하고 있습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/slow-queries"

          # Ojeomneo Slow Queries
          - alert: OjeomneoPlatformDatabaseSlowQueries
            expr: |
              sum(rate(ojeomneo_db_slow_queries_total[5m])) > 1
            for: 5m
            labels:
              severity: warning
              service: ojeomneo
              category: database
            annotations:
              summary: "Ojeomneo 데이터베이스 슬로우 쿼리가 많습니다"
              description: "Ojeomneo에서 초당 {{ $value | humanize }}개의 슬로우 쿼리(>1초)가 5분 이상 발생하고 있습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/slow-queries"

          # ReviewMaps Connection Pool Exhaustion
          - alert: ReviewMapsDatabaseConnectionPoolExhaustion
            expr: |
              reviewmaps_db_connection_pool_in_use > 20
            for: 5m
            labels:
              severity: critical
              service: reviewmaps
              category: database
            annotations:
              summary: "ReviewMaps 데이터베이스 커넥션 풀이 거의 고갈되었습니다"
              description: "ReviewMaps의 커넥션 풀 사용량이 {{ $value }}개로 최대 25개 중 80%를 5분 이상 초과했습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/connection-pool-exhaustion"

          # Ojeomneo Connection Pool Exhaustion
          - alert: OjeomneoPlatformDatabaseConnectionPoolExhaustion
            expr: |
              ojeomneo_db_connection_pool_in_use > 20
            for: 5m
            labels:
              severity: critical
              service: ojeomneo
              category: database
            annotations:
              summary: "Ojeomneo 데이터베이스 커넥션 풀이 거의 고갈되었습니다"
              description: "Ojeomneo의 커넥션 풀 사용량이 {{ $value }}개로 최대 25개 중 80%를 5분 이상 초과했습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/connection-pool-exhaustion"

          # ReviewMaps High DB Error Rate
          - alert: ReviewMapsDatabaseHighErrorRate
            expr: |
              sum(rate(reviewmaps_db_errors_total[5m])) > 5
            for: 5m
            labels:
              severity: critical
              service: reviewmaps
              category: database
            annotations:
              summary: "ReviewMaps 데이터베이스 에러율이 높습니다"
              description: "ReviewMaps에서 초당 {{ $value | humanize }}개의 데이터베이스 에러가 5분 이상 발생하고 있습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/database-errors"

          # Ojeomneo High DB Error Rate
          - alert: OjeomneoPlatformDatabaseHighErrorRate
            expr: |
              sum(rate(ojeomneo_db_errors_total[5m])) > 5
            for: 5m
            labels:
              severity: critical
              service: ojeomneo
              category: database
            annotations:
              summary: "Ojeomneo 데이터베이스 에러율이 높습니다"
              description: "Ojeomneo에서 초당 {{ $value | humanize }}개의 데이터베이스 에러가 5분 이상 발생하고 있습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/database-errors"

      - name: service-availability-alerts
        interval: 30s
        rules:
          # ReviewMaps Service Down
          - alert: ReviewMapsServiceDown
            expr: |
              sum(rate(reviewmaps_http_requests_total[2m])) == 0
            for: 2m
            labels:
              severity: critical
              service: reviewmaps
              category: availability
            annotations:
              summary: "ReviewMaps 서비스가 다운되었습니다"
              description: "ReviewMaps에서 2분간 HTTP 요청이 감지되지 않았습니다. 서비스가 다운된 것으로 보입니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/service-down"

          # Ojeomneo Service Down
          - alert: OjeomneoPlatformServiceDown
            expr: |
              sum(rate(ojeomneo_http_requests_total[2m])) == 0
            for: 2m
            labels:
              severity: critical
              service: ojeomneo
              category: availability
            annotations:
              summary: "Ojeomneo 서비스가 다운되었습니다"
              description: "Ojeomneo에서 2분간 HTTP 요청이 감지되지 않았습니다. 서비스가 다운된 것으로 보입니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/service-down"

          # ReviewMaps Pod Restart
          - alert: ReviewMapsPodRestarting
            expr: |
              rate(kube_pod_container_status_restarts_total{namespace="reviewmaps"}[15m]) > 0
            for: 5m
            labels:
              severity: warning
              service: reviewmaps
              category: availability
            annotations:
              summary: "ReviewMaps Pod가 재시작되고 있습니다"
              description: "ReviewMaps Pod가 지난 15분간 재시작되었습니다. 안정성 문제가 있을 수 있습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/pod-restarts"

          # Ojeomneo Pod Restart
          - alert: OjeomneoPlatformPodRestarting
            expr: |
              rate(kube_pod_container_status_restarts_total{namespace="ojeomneo"}[15m]) > 0
            for: 5m
            labels:
              severity: warning
              service: ojeomneo
              category: availability
            annotations:
              summary: "Ojeomneo Pod가 재시작되고 있습니다"
              description: "Ojeomneo Pod가 지난 15분간 재시작되었습니다. 안정성 문제가 있을 수 있습니다."
              runbook_url: "https://docs.ggorockee.com/runbooks/pod-restarts"
